<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockWorld Demo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#1c1c1c;
  position:sticky;
  top:0;
}

.logo a{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:white;
}

.logo img{
  height:35px;
}

/* NAV */
nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

nav a:hover{
  color:#00b7ff;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px;
  background:linear-gradient(135deg,#1a1a1a,#2a2a2a);
}

.hero h1{
  font-size:40px;
}

/* BUTTON */
button{
  padding:10px 15px;
  background:#00b7ff;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* SECTIONS */
.section{
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:#1d1d1d;
  padding:15px;
  border-radius:10px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

/* PROFILE */
.profile{
  background:#181818;
  padding:15px;
  border-radius:10px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>

<div class="logo">
  <a href="#home">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Roblox_%282025%29_%28App_Icon%29.svg/500px-Roblox_%282025%29_%28App_Icon%29.svg.png">
    <span>BlockWorld</span>
  </a>
</div>

<nav>
  <a href="#home">Home</a>
  <a href="#games">Games</a>
  <a href="#profile" onclick="showProfile()">Profile</a>
  <a href="#admin" onclick="showAdmin()">Admin</a>
  <a href="#" onclick="openLogin()">Login</a>
</nav>

</header>

<!-- HERO -->
<section class="hero" id="home">
  <h1>Play. Build. Explore.</h1>
  <p>Your gaming world starts here</p>
  <button onclick="openLogin()">Get Started</button>
</section>

<!-- GAMES -->
<section class="section" id="games">
<h2>Games</h2>

<div class="grid">
  <div class="card">Battle Arena</div>
  <div class="card">Sky Adventure</div>
  <div class="card">Zombie World</div>
</div>
</section>

<!-- PROFILE -->
<section class="section" id="profile" style="display:none;">
<h2>Profile</h2>
<div class="profile" id="profileBox">
No user logged in
</div>
</section>

<!-- ADMIN -->
<section class="section" id="admin" style="display:none;">
<h2>Admin Panel</h2>
<div class="profile" id="adminBox"></div>
</section>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
<div class="modal-content">

<h3>Login</h3>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="closeLogin()">Close</button>

</div>
</div>

<script>

/* OPEN LOGIN */
function openLogin(){
  document.getElementById("loginModal").style.display="flex";
}

/* CLOSE LOGIN */
function closeLogin(){
  document.getElementById("loginModal").style.display="none";
}

/* LOGIN + SAVE */
function login(){

  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;

  if(!u || !p){
    alert("Fill all fields");
    return;
  }

  let user={
    username:u,
    password:p
  };

  localStorage.setItem("userData",JSON.stringify(user));

  alert("Login saved!");
  closeLogin();
  showProfile();
}

/* PROFILE */
function showProfile(){
  document.getElementById("profile").style.display="block";

  let data=JSON.parse(localStorage.getItem("userData"));

  if(data){
    document.getElementById("profileBox").innerHTML=
    "Username: "+data.username+"<br>Password: "+data.password;
  }
}

/* ADMIN */
function showAdmin(){
  document.getElementById("admin").style.display="block";

  let data=JSON.parse(localStorage.getItem("userData"));

  if(data){
    document.getElementById("adminBox").innerHTML=
    "Stored User:<br>"+data.username;
  }
}

</script>

</body>
</html>
