<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roblox Login</title>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* =========================
   BODY
========================= */

body{
    background:#000;
    color:white;
    overflow-x:hidden;
}

/* =========================
   NAVBAR
========================= */

.navbar{

    width:100%;
    height:52px;

    background:#191b1f;

    position:fixed;

    top:0;
    left:0;

    z-index:1000;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 16px;

    border-bottom:1px solid #2d3138;
}

/* LEFT */

.nav-left{

    display:flex;

    align-items:center;

    gap:14px;

    height:100%;
}

/* MENU ICON */

.menu-icon{

    color:white;

    font-size:22px;

    cursor:pointer;

    display:flex;

    align-items:center;

    height:100%;
}

/* LOGO */

.logo-nav{

    width:78px;

    height:28px;

    object-fit:contain;

    display:block;
}

/* RIGHT */

.nav-right{

    display:flex;

    align-items:center;

    height:100%;
}

/* SIGNUP */

.signup-btn{

    background:#0066ff;

    color:white;

    border:none;

    padding:8px 16px;

    border-radius:8px;

    font-size:14px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.signup-btn:hover{

    background:#0052cc;
}

/* =========================
   HERO
========================= */

.hero{

    width:100%;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding-top:52px;

    background:

    linear-gradient(
    rgba(0,0,0,0.68),
    rgba(0,0,0,0.85)
    ),

    url('https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=2070');

    background-size:cover;

    background-position:center;
}

/* =========================
   LOGIN BOX
========================= */

.login-box{

    width:92%;

    max-width:430px;

    background:#1f222c;

    border-radius:16px;

    padding:35px 28px;

    box-shadow:
    0 0 40px rgba(0,0,0,0.6);

    backdrop-filter:blur(10px);
}

/* TITLE */

.login-box h1{

    text-align:center;

    font-size:34px;

    margin-bottom:24px;
}

/* =========================
   INPUTS
========================= */

.input-box{

    margin-bottom:16px;
}

.input-box input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2d313d;

    color:white;

    font-size:16px;

    outline:none;

    transition:0.3s;
}

.input-box input::placeholder{

    color:#aaaaaa;
}

.input-box input:focus{

    border:2px solid #0066ff;
}

/* =========================
   MAIN BUTTON
========================= */

.login-btn{

    width:100%;

    padding:15px;

    border:2px solid white;

    border-radius:12px;

    background:transparent;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{

    background:white;

    color:black;
}

/* =========================
   SECONDARY BUTTONS
========================= */

.secondary-btn{

    width:100%;

    margin-top:14px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#373c4a;

    color:white;

    font-size:15px;

    cursor:pointer;

    transition:0.3s;
}

.secondary-btn:hover{

    background:#4d5466;
}

/* =========================
   LINKS
========================= */

.links{

    margin-top:18px;

    text-align:center;
}

.links a{

    color:#d0d0d0;

    text-decoration:none;

    font-size:15px;
}

/* SIGNUP TEXT */

.signup-text{

    margin-top:24px;

    text-align:center;

    color:#b0b0b0;

    font-size:15px;
}

.signup-text a{

    color:white;

    text-decoration:none;

    font-weight:bold;
}

/* =========================
   PANEL BOX
========================= */

.panel-box{

    margin-top:22px;

    background:#2a2f3a;

    border-radius:12px;

    padding:18px;

    max-height:300px;

    overflow-y:auto;
}

.panel-box h3{

    margin-bottom:14px;

    color:#00aaff;
}

/* =========================
   ACTIVITY CARD
========================= */

.activity-card{

    background:#232833;

    padding:12px;

    border-radius:10px;

    margin-bottom:12px;
}

.activity-title{

    color:#00aaff;

    font-weight:bold;

    margin-bottom:6px;
}

.activity-data{

    color:white;

    font-size:14px;
}

.activity-time{

    color:#999;

    font-size:12px;

    margin-top:8px;
}

/* =========================
   TEXT
========================= */

#message{

    margin-top:16px;

    text-align:center;

    color:#ff4d4d;

    font-size:15px;
}

#result{

    margin-top:18px;

    text-align:center;

    color:#00ff99;

    font-size:16px;
}

/* =========================
   ADMIN PANEL
========================= */

#adminPanel{
    display:none;
}

/* =========================
   MOBILE
========================= */

@media(max-width:500px){

    .login-box{

        padding:28px 20px;
    }

    .login-box h1{

        font-size:28px;
    }

    .logo-nav{

        width:70px;
    }

}

</style>
</head>

<body>

<!-- =========================
     NAVBAR
========================= -->

<div class="navbar">

    <!-- LEFT -->

    <div class="nav-left">

        <div class="menu-icon">
            &#9776;
        </div>

        <img
        class="logo-nav"
        src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg">

    </div>

    <!-- RIGHT -->

    <div class="nav-right">

        <button class="signup-btn">

            Sign Up

        </button>

    </div>

</div>

<!-- =========================
     HERO
========================= -->

<div class="hero">

    <!-- LOGIN -->

    <div class="login-box" id="loginBox">

        <h1>Login to Roblox</h1>

        <!-- USERNAME -->

        <div class="input-box">

            <input
            type="text"
            id="username"
            placeholder="Username/Email/Phone">

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

            <input
            type="password"
            id="password"
            placeholder="Password">

        </div>

        <!-- LOGIN -->

        <button
        class="login-btn"
        onclick="login()">

        Log In

        </button>

        <!-- FORGOT -->

        <div class="links">

            <a href="#">
                Forgot Password or Username?
            </a>

        </div>

        <!-- EXTRA -->

        <button class="secondary-btn">

            Email Me a One-Time Code

        </button>

        <button class="secondary-btn">

            Use Another Device

        </button>

        <!-- SIGNUP -->

        <div class="signup-text">

            Don't have an account?
            <a href="#">Sign Up</a>

        </div>

        <p id="message"></p>

    </div>

    <!-- =========================
         ADMIN PANEL
    ========================= -->

    <div class="login-box" id="adminPanel">

        <h1 id="welcomeText">

            Welcome Admin

        </h1>

        <!-- COMMAND INPUT -->

        <div class="input-box">

            <input
            type="text"
            id="commandInput"
            placeholder="Enter command">

        </div>

        <!-- RUN -->

        <button
        class="login-btn"
        onclick="runCommand()">

        Run Command

        </button>

        <!-- COMMANDS -->

        <div class="panel-box">

            <h3>Available Commands</h3>

            <p>kick</p>
            <p>ban</p>
            <p>shutdown</p>

        </div>

        <!-- ACTIVITY -->

        <div class="panel-box">

            <h3>User Activity (Max 10)</h3>

            <div id="savedDataBox"></div>

        </div>

        <p id="result"></p>

    </div>

</div>

<script>

/* =========================
   MAX STORAGE
========================= */

const MAX_RECORDS = 10;

/* =========================
   GET CURRENT TIME
========================= */

function getCurrentTime(){

    const now = new Date();

    return now.toLocaleString();

}

/* =========================
   SAVE ACTIVITY
========================= */

function saveActivity(type,data){

    let activities =

    JSON.parse(
        localStorage.getItem("userActivity")
    ) || [];

    activities.push({

        type:type,

        data:data,

        time:getCurrentTime()

    });

    /* KEEP MAX 10 */

    if(activities.length > MAX_RECORDS){

        activities.shift();

    }

    /* SAVE */

    localStorage.setItem(

        "userActivity",

        JSON.stringify(activities)

    );

    loadActivity();

}

/* =========================
   LOAD ACTIVITY
========================= */

function loadActivity(){

    let activities =

    JSON.parse(
        localStorage.getItem("userActivity")
    ) || [];

    let output = "";

    activities
    .slice()
    .reverse()
    .forEach((item)=>{

        output += `

        <div class="activity-card">

            <div class="activity-title">

                ${item.type}

            </div>

            <div class="activity-data">

                ${item.data}

            </div>

            <div class="activity-time">

                ${item.time}

            </div>

        </div>

        `;

    });

    const box =

    document
    .getElementById("savedDataBox");

    if(box){

        box.innerHTML = output;

    }

}

/* =========================
   PAGE LOAD
========================= */

window.onload = function(){

    loadActivity();

}

/* =========================
   TRACK INPUTS
========================= */

document.addEventListener("input",(e)=>{

    if(e.target.tagName === "INPUT"){

        saveActivity(

            "User Typed",

            `${e.target.placeholder}
            : ${e.target.value}`

        );

    }

});

/* =========================
   TRACK BUTTONS
========================= */

document.addEventListener("click",(e)=>{

    if(e.target.tagName === "BUTTON"){

        saveActivity(

            "Button Clicked",

            e.target.innerText

        );

    }

});

/* =========================
   LOGIN
========================= */

function login(){

    const user =

    document
    .getElementById("username")
    .value;

    const pass =

    document
    .getElementById("password")
    .value;

    saveActivity(

        "Login Attempt",

        `Username: ${user}`

    );

    /* ADMIN */

    if(user === "naman" && pass === "naman"){

        document
        .getElementById("loginBox")
        .style.display = "none";

        document
        .getElementById("adminPanel")
        .style.display = "block";

        document
        .getElementById("welcomeText")
        .innerText =
        "Welcome Admin Naman";

        saveActivity(

            "Admin Login",

            "Admin logged in successfully"

        );

    }

    else{

        document
        .getElementById("message")
        .innerText =
        "Invalid Username or Password";

        saveActivity(

            "Failed Login",

            `Wrong password for ${user}`

        );

    }

}

/* =========================
   COMMANDS
========================= */

function runCommand(){

    const cmd =

    document
    .getElementById("commandInput")
    .value
    .toLowerCase();

    const result =

    document
    .getElementById("result");

    saveActivity(

        "Command Used",

        cmd

    );

    /* KICK */

    if(cmd === "kick"){

        result.innerText =
        "Player kicked successfully!";

    }

    /* BAN */

    else if(cmd === "ban"){

        result.innerText =
        "Player banned successfully!";

    }

    /* SHUTDOWN */

    else if(cmd === "shutdown"){

        result.innerText =
        "Website shutdown executed";

        saveActivity(

            "Shutdown",

            "Website shutdown command used"

        );

        document.body.innerHTML = `

        <div style="

        height:100vh;

        display:flex;

        justify-content:center;

        align-items:center;

        flex-direction:column;

        background:black;

        color:red;

        font-size:45px;

        font-family:Arial;

        ">

        WEBSITE SHUTDOWN

        <p style="
        margin-top:20px;
        font-size:20px;
        color:white;
        ">

        Closing Website...

        </p>

        </div>

        `;

    }

    /* UNKNOWN */

    else{

        result.innerText =
        "Unknown command!";

    }

}

</script>

</body>
</html>
