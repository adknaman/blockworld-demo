<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Demo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#1c1c1c;
  position:sticky;
  top:0;
}

.logo a{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:white;
}

.logo img{
  height:35px;
}

nav a{
  color:white;
  margin:0 10px;
  text-decoration:none;
}

nav a:hover{
  color:#00b7ff;
}

.hero{
  text-align:center;
  padding:70px;
  background:linear-gradient(135deg,#1a1a1a,#2a2a2a);
}

.hero h1{
  font-size:40px;
}

button{
  padding:10px 15px;
  background:#00b7ff;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.section{
  padding:20px;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

.profile{
  background:#181818;
  padding:15px;
  border-radius:10px;
}

.admin{
  background:#111;
  border:1px solid #333;
  padding:15px;
  border-radius:10px;
}
</style>

</head>

<body>

<header>

<div class="logo">
  <a href="#home">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Roblox_%282025%29_%28App_Icon%29.svg/500px-Roblox_%282025%29_%28App_Icon%29.svg.png">
    <span>Roblox Demo</span>
  </a>
</div>

<nav>
  <a href="#home">Home</a>
  <a href="#profile" onclick="showProfile()">Profile</a>
  <a href="#admin" id="adminNav" style="display:none" onclick="showAdmin()">Admin</a>
  <a href="#" onclick="openLogin()">Login</a>
</nav>

</header>

<section class="hero" id="home">
  <h1>Play. Build. Explore.</h1>
  <p>Your Roblox-style world starts here</p>
  <button onclick="openLogin()">Get Started</button>
</section>

<section class="section" id="profile" style="display:none;">
<h2>Profile</h2>
<div class="profile" id="profileBox">No user logged in</div>
</section>

<section class="section" id="admin" style="display:none;">
<h2>Admin Panel</h2>
<div class="admin" id="adminBox"></div>
</section>

<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="closeLogin()">Close</button>
</div>
</div>

<script>

function openLogin(){
  document.getElementById("loginModal").style.display="flex";
}

function closeLogin(){
  document.getElementById("loginModal").style.display="none";
}

function login(){

  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;

  if(!u || !p){
    alert("Fill all fields");
    return;
  }

  localStorage.setItem("userData",JSON.stringify({username:u,password:p}));

  alert("Login saved!");
  closeLogin();

  showProfile();
  checkAdmin(u);
}

function showProfile(){
  document.getElementById("profile").style.display="block";

  let data=JSON.parse(localStorage.getItem("userData"));

  if(data){
    document.getElementById("profileBox").innerHTML=
    "Username: "+data.username+"<br>Password: "+data.password;
  }
}

function checkAdmin(username){

  if(username === "Naman"){
    document.getElementById("admin").style.display="block";
    document.getElementById("adminNav").style.display="inline";

    document.getElementById("adminBox").innerHTML=
    "Welcome Admin Naman 👑<br>Full system access granted.";
  }
}

function showAdmin(){
  document.getElementById("admin").style.display="block";
}

window.onload=function(){
  let data=JSON.parse(localStorage.getItem("userData"));
  if(data){
    showProfile();
    checkAdmin(data.username);
  }
}

</script>

</body>
</html>
