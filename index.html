<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Admin Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f0f0f;
    color:white;
}

.container{
    background:#1e1e1e;
    padding:30px;
    border-radius:12px;
    width:360px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.logo{
    width:180px;
    margin-bottom:20px;
}

h1{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#2d2d2d;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#0078ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#005fd1;
}

#adminPanel{
    display:none;
}

.command-list{
    margin-top:20px;
    text-align:left;
    background:#2a2a2a;
    padding:15px;
    border-radius:8px;
}

.command-list p{
    margin:5px 0;
}

.saved-data{
    margin-top:20px;
    text-align:left;
    background:#2a2a2a;
    padding:15px;
    border-radius:8px;
}

#message{
    margin-top:15px;
    color:#ff4d4d;
}

#result{
    margin-top:15px;
    color:#00ff99;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="container" id="loginBox">

    <img 
    class="logo"
    src="https://upload.wikimedia.org/wikipedia/commons/4/48/Roblox_Logo_2021.png?_=20211127162044"
    alt="Roblox Logo">

    <h1>Login</h1>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Log In</button>

    <p id="message"></p>
</div>

<!-- ADMIN PANEL -->
<div class="container" id="adminPanel">

    <img 
    class="logo"
    src="https://upload.wikimedia.org/wikipedia/commons/4/48/Roblox_Logo_2021.png?_=20211127162044"
    alt="Roblox Logo">

    <h1>Admin Panel</h1>

    <p>Welcome Admin!</p>

    <input type="text" id="commandInput" placeholder="Enter command">

    <button onclick="runCommand()">Run Command</button>

    <div class="command-list">
        <h3>Available Commands</h3>
        <p>kick</p>
        <p>ban</p>
        <p>shutdown</p>
    </div>

    <div class="saved-data">
        <h3>Saved Login Data</h3>
        <p id="savedUser"></p>
        <p id="savedPass"></p>
    </div>

    <p id="result"></p>

</div>

<script>

// Load Saved Data
window.onload = function(){

    const savedUser = localStorage.getItem("savedUsername");
    const savedPass = localStorage.getItem("savedPassword");

    if(savedUser){
        document.getElementById("savedUser").innerText =
        "Username: " + savedUser;
    }

    if(savedPass){
        document.getElementById("savedPass").innerText =
        "Password: " + savedPass;
    }
};

// Login System
function login(){

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    // Save Data To Local Storage
    localStorage.setItem("savedUsername", user);
    localStorage.setItem("savedPassword", pass);

    // Admin Login
    if(user === "naman" && pass === "naman"){

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";

        document.getElementById("savedUser").innerText =
        "Username: " + user;

        document.getElementById("savedPass").innerText =
        "Password: " + pass;

    } else {

        document.getElementById("message").innerText =
        "Invalid Username or Password";
    }
}

// Command System
function runCommand(){

    const cmd = document.getElementById("commandInput").value.toLowerCase();
    const result = document.getElementById("result");

    if(cmd === "kick"){
        result.innerText = "Player kicked successfully!";
    }
    else if(cmd === "ban"){
        result.innerText = "Player banned successfully!";
    }
    else if(cmd === "shutdown"){
        result.innerText = "Server shutting down...";
    }
    else{
        result.innerText = "Unknown command!";
    }
}

</script>

</body>
</html>
