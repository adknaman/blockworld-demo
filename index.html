<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Login</title>

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* BODY */

body{
    background:#000;
    overflow-x:hidden;
    color:white;
}

/* TOP NAVBAR */

.navbar{
    width:100%;
    height:70px;
    background:#12131a;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.logo-nav{
    width:90px;
}

.nav-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.signup-btn{
    background:#0066ff;
    border:none;
    padding:10px 22px;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.signup-btn:hover{
    background:#0052cc;
}

/* HERO */

.hero{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.65),
    rgba(0,0,0,0.75)),
    url('https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=2070');
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:80px;
}

/* LOGIN BOX */

.login-box{
    width:92%;
    max-width:430px;
    background:#1b1d27;
    padding:40px 30px;
    border-radius:16px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);
}

.login-box h1{
    text-align:center;
    font-size:42px;
    margin-bottom:25px;
}

/* INPUTS */

.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#2a2d3a;
    color:white;
    font-size:17px;
    outline:none;
    transition:0.3s;
}

.input-box input:focus{
    border:2px solid #0066ff;
}

.input-box input::placeholder{
    color:#aaa;
}

/* BUTTONS */

.login-btn{
    width:100%;
    padding:15px;
    border:2px solid #fff;
    border-radius:12px;
    background:transparent;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:white;
    color:black;
}

.secondary-btn{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#34384b;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
}

.secondary-btn:hover{
    background:#4a4f66;
}

/* LINKS */

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    color:#d0d0d0;
    text-decoration:none;
    font-size:17px;
}

.signup-text{
    margin-top:30px;
    text-align:center;
    color:#bbb;
    font-size:17px;
}

.signup-text a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* ADMIN PANEL */

#adminPanel{
    display:none;
}

.panel-box{
    margin-top:25px;
    background:#252838;
    padding:18px;
    border-radius:12px;
}

.panel-box h3{
    margin-bottom:12px;
    color:#00aaff;
}

.panel-box p{
    margin:7px 0;
}

/* MESSAGE */

#message{
    text-align:center;
    margin-top:15px;
    color:#ff4d4d;
    font-size:16px;
}

#result{
    margin-top:18px;
    color:#00ff99;
    text-align:center;
    font-size:17px;
}

/* MOBILE */

@media(max-width:500px){

    .login-box{
        padding:35px 20px;
    }

    .login-box h1{
        font-size:34px;
    }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <img
    class="logo-nav"
    src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg">

    <div class="nav-right">

        <button class="signup-btn">
            Sign Up
        </button>

    </div>

</div>

<!-- HERO -->

<div class="hero">

    <!-- LOGIN -->

    <div class="login-box" id="loginBox">

        <h1>Login to Roblox</h1>

        <div class="input-box">

            <input
            type="text"
            id="username"
            placeholder="Username/Email/Phone">

        </div>

        <div class="input-box">

            <input
            type="password"
            id="password"
            placeholder="Password">

        </div>

        <button
        class="login-btn"
        onclick="login()">
        Log In
        </button>

        <div class="links">

            <a href="#">
                Forgot Password or Username?
            </a>

        </div>

        <button class="secondary-btn">
            Email Me a One-Time Code
        </button>

        <button class="secondary-btn">
            Quick Sign-In
        </button>

        <div class="signup-text">

            Don't have an account?
            <a href="#">Sign Up</a>

        </div>

        <p id="message"></p>

    </div>

    <!-- ADMIN PANEL -->

    <div class="login-box" id="adminPanel">

        <h1 id="welcomeText">
            Welcome Admin
        </h1>

        <div class="input-box">

            <input
            type="text"
            id="commandInput"
            placeholder="Enter command">

        </div>

        <button
        class="login-btn"
        onclick="runCommand()">
        Run Command
        </button>

        <!-- COMMANDS -->

        <div class="panel-box">

            <h3>Available Commands</h3>

            <p>kick</p>
            <p>ban</p>
            <p>shutdown</p>

        </div>

        <!-- SAVED -->

        <div class="panel-box">

            <h3>Saved Login Data</h3>

            <p id="savedUser"></p>
            <p id="savedPass"></p>

        </div>

        <p id="result"></p>

    </div>

</div>

<script>

/* LOAD DATA */

window.onload = function(){

    const savedUser =
    localStorage.getItem("savedUsername");

    const savedPass =
    localStorage.getItem("savedPassword");

    if(savedUser){

        document
        .getElementById("savedUser")
        .innerText =
        "Username: " + savedUser;
    }

    if(savedPass){

        document
        .getElementById("savedPass")
        .innerText =
        "Password: " + savedPass;
    }

}

/* LOGIN */

function login(){

    const user =
    document.getElementById("username").value;

    const pass =
    document.getElementById("password").value;

    localStorage.setItem(
        "savedUsername",
        user
    );

    localStorage.setItem(
        "savedPassword",
        pass
    );

    if(user === "naman" && pass === "naman"){

        document
        .getElementById("loginBox")
        .style.display = "none";

        document
        .getElementById("adminPanel")
        .style.display = "block";

        document
        .getElementById("welcomeText")
        .innerText =
        "Welcome Admin Naman";

        document
        .getElementById("savedUser")
        .innerText =
        "Username: " + user;

        document
        .getElementById("savedPass")
        .innerText =
        "Password: " + pass;

    }

    else{

        document
        .getElementById("message")
        .innerText =
        "Invalid Username or Password";

    }

}

/* COMMAND SYSTEM */

function runCommand(){

    const cmd =
    document
    .getElementById("commandInput")
    .value
    .toLowerCase();

    const result =
    document.getElementById("result");

    if(cmd === "kick"){

        result.innerText =
        "Player kicked successfully!";

    }

    else if(cmd === "ban"){

        result.innerText =
        "Player banned successfully!";

    }

    else if(cmd === "shutdown"){

        document.body.innerHTML = `

        <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        background:black;
        color:red;
        font-size:45px;
        font-family:Arial;
        ">

        WEBSITE SHUTDOWN

        <p style="
        margin-top:20px;
        font-size:20px;
        color:white;
        ">

        Closing Website...

        </p>

        </div>

        `;

    }

    else{

        result.innerText =
        "Unknown command!";

    }

}

</script>

</body>
</html>
