<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roblox</title>

<link rel="icon"
href="https://www.roblox.com/favicon.ico">

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* BODY */

body{
    background:black;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */

.navbar{

    width:100%;

    height:52px;

    background:#191b1f;

    position:fixed;

    top:0;
    left:0;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 18px;

    border-bottom:1px solid #2d3138;

    z-index:999;
}

/* LEFT */

.nav-left{

    display:flex;

    align-items:center;

    gap:18px;
}

/* MENU */

.menu-icon{

    font-size:24px;

    color:white;

    cursor:pointer;
}

/* LOGO */

.logo-nav{

    width:90px;

    height:30px;

    object-fit:contain;
}

/* LINKS */

.nav-links{

    display:flex;

    align-items:center;

    gap:20px;
}

.nav-links a{

    color:#d7d7d7;

    text-decoration:none;

    font-size:15px;
}

.nav-links a:hover{

    color:white;
}

/* CENTER SEARCH */

.nav-center{

    position:absolute;

    left:50%;

    transform:translateX(-50%);
}

/* SEARCH BAR */

.search-bar{

    width:350px;

    padding:11px 18px;

    border:none;

    border-radius:8px;

    background:#2a2f3a;

    color:white;

    outline:none;

    font-size:14px;
}

.search-bar::placeholder{

    color:#aaa;
}

/* SIGNUP */

.signup-btn{

    background:#0066ff;

    color:white;

    border:none;

    padding:8px 18px;

    border-radius:8px;

    cursor:pointer;

    font-weight:bold;
}

/* HERO */

.hero{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding-top:60px;

    background:

    linear-gradient(
    rgba(0,0,0,0.65),
    rgba(0,0,0,0.85)
    ),

    url('https://images.rbxcdn.com/782b7fc18a24ee997efd9a7f02fa4bf9-bg_08072019.jpg');

    background-size:cover;

    background-position:center;

    background-repeat:no-repeat;
}

/* LOGIN BOX */

.login-box{

    width:92%;

    max-width:430px;

    background:#111217;

    border-radius:16px;

    padding:35px 28px;

    border:1px solid #2d3138;

    box-shadow:0 0 40px rgba(0,0,0,0.7);
}

/* TITLE */

.login-box h1{

    text-align:center;

    margin-bottom:24px;

    font-size:34px;
}

/* INPUT */

.input-box{

    position:relative;

    margin-bottom:16px;
}

.input-box input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2d313d;

    color:white;

    font-size:16px;

    outline:none;
}

.input-box input::placeholder{

    color:#aaa;
}

/* SHOW PASS */

.show-pass-btn{

    position:absolute;

    right:12px;

    top:50%;

    transform:translateY(-50%);

    background:none;

    border:none;

    color:#00aaff;

    font-weight:bold;

    cursor:pointer;
}

/* LOGIN BUTTON */

.login-btn{

    width:100%;

    padding:15px;

    border:2px solid white;

    border-radius:12px;

    background:transparent;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{

    background:white;

    color:black;
}

/* EXTRA BUTTON */

.secondary-btn{

    width:100%;

    margin-top:14px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#373c4a;

    color:white;

    cursor:pointer;
}

/* LINKS */

.links{

    margin-top:18px;

    text-align:center;
}

.links a{

    color:#d0d0d0;

    text-decoration:none;
}

/* SIGNUP TEXT */

.signup-text{

    margin-top:24px;

    text-align:center;

    color:#aaa;
}

.signup-text a{

    color:white;

    text-decoration:none;

    font-weight:bold;
}

/* MESSAGE */

#message{

    margin-top:16px;

    text-align:center;

    color:#ff4d4d;
}

/* ADMIN PANEL */

#adminPanel{

    display:none;
}

/* PANEL */

.panel-box{

    margin-top:22px;

    background:#2a2f3a;

    border-radius:12px;

    padding:18px;

    max-height:400px;

    overflow-y:auto;
}

/* USER DATA */

.activity-card{

    background:#232833;

    padding:12px;

    border-radius:10px;

    margin-bottom:10px;

    font-size:14px;

    color:white;
}

/* MOBILE */

@media(max-width:950px){

    .nav-links{

        display:none;
    }

    .search-bar{

        width:220px;
    }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <!-- LEFT -->

    <div class="nav-left">

        <div class="menu-icon">

            ☰

        </div>

        <img
        class="logo-nav"
        src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg">

        <div class="nav-links">

            <a href="#">Charts</a>

            <a href="#">Marketplace</a>

            <a href="#">Create</a>

            <a href="#">Robux</a>

        </div>

    </div>

    <!-- CENTER SEARCH -->

    <div class="nav-center">

        <input
        type="text"
        class="search-bar"
        placeholder="Search">

    </div>

    <!-- RIGHT -->

    <button class="signup-btn">

        Sign Up

    </button>

</div>

<!-- HERO -->

<div class="hero">

    <!-- LOGIN -->

    <div class="login-box" id="loginBox">

        <h1>Login to Roblox</h1>

        <!-- USERNAME -->

        <div class="input-box">

            <input
            type="text"
            id="username"
            placeholder="Username">

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

            <input
            type="password"
            id="password"
            placeholder="Password">

            <button
            class="show-pass-btn"
            onclick="togglePassword()"
            id="toggleBtn">

            Show

            </button>

        </div>

        <!-- LOGIN -->

        <button
        class="login-btn"
        onclick="login()">

        Log In

        </button>

        <!-- LINKS -->

        <div class="links">

            <a href="#">

                Forgot Password or Username?

            </a>

        </div>

        <!-- EXTRA -->

        <button class="secondary-btn">

            Email Me a One-Time Code

        </button>

        <button class="secondary-btn">

            Use Another Device

        </button>

        <!-- SIGNUP -->

        <div class="signup-text">

            Don't have an account?

            <a href="#">

                Sign Up

            </a>

        </div>

        <p id="message"></p>

    </div>

    <!-- ADMIN PANEL -->

    <div class="login-box" id="adminPanel">

        <h1>Admin Panel</h1>

        <!-- COMMAND -->

        <div class="input-box">

            <input
            type="text"
            id="commandInput"
            placeholder="Enter command">

        </div>

        <!-- RUN -->

        <button
        class="login-btn"
        onclick="runCommand()">

        Run Command

        </button>

        <!-- USER DATA -->

        <div class="panel-box">

            <h3>User Activity</h3>

            <div id="savedDataBox"></div>

        </div>

    </div>

</div>

<script>

/* SHOW PASSWORD */

function togglePassword(){

    const passInput =
    document.getElementById("password");

    const btn =
    document.getElementById("toggleBtn");

    if(passInput.type === "password"){

        passInput.type = "text";

        btn.innerText = "Hide";

    }

    else{

        passInput.type = "password";

        btn.innerText = "Show";
    }

}

/* SAVE USER DATA */

function saveActivity(text){

    const box =
    document.getElementById("savedDataBox");

    const div =
    document.createElement("div");

    div.className = "activity-card";

    div.innerText = text;

    box.prepend(div);

}

/* LOGIN */

function login(){

    const user =
    document.getElementById("username").value;

    const pass =
    document.getElementById("password").value;

    if(user === "" || pass === ""){

        document
        .getElementById("message")
        .innerText =
        "Enter Username and Password";

        return;
    }

    /* SAVE USER + PASSWORD */

    saveActivity(

        `USERNAME: ${user} | PASSWORD: ${pass}`

    );

    /* ADMIN LOGIN */

    if(user === "naman"
    && pass === "adhikari"){

        document
        .getElementById("loginBox")
        .style.display = "none";

        document
        .getElementById("adminPanel")
        .style.display = "block";

    }

    else{

        document
        .getElementById("message")
        .innerText =
        "Invalid Username or Password";
    }

}

/* COMMANDS */

function runCommand(){

    const cmd =
    document
    .getElementById("commandInput")
    .value
    .toLowerCase();

    if(cmd === "clear"){

        document
        .getElementById("savedDataBox")
        .innerHTML = "";

    }

    else{

        saveActivity(
            "COMMAND: " + cmd
        );
    }

}

</script>

</body>
</html>
