<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

/* TOP BAR */

.topbar{
    width:100%;
    background:#1e1e1e;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* LEFT SIDE */

.left-top{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    width:150px;
}

.roblox-text{
    font-size:32px;
    font-weight:bold;
}

/* RIGHT SIDE */

.right-top button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#0078ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.right-top button:hover{
    background:#005fd1;
}

/* MAIN */

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    margin-top:80px;
}

/* WELCOME */

.welcome-title{
    font-size:55px;
    margin-bottom:15px;
}

.welcome-sub{
    font-size:22px;
    color:#cccccc;
    margin-bottom:40px;
}

/* LOGIN BOX */

.login-box{
    width:380px;
    background:#1e1e1e;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    text-align:center;
}

.login-box h2{
    margin-bottom:20px;
}

/* INPUT */

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#2d2d2d;
    color:white;
    font-size:16px;
}

/* BUTTON */

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0078ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

.login-btn:hover{
    background:#005fd1;
}

/* MESSAGE */

#message{
    margin-top:15px;
    color:red;
}

/* ADMIN PANEL */

#adminPanel{
    display:none;
    width:380px;
    background:#1e1e1e;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    text-align:center;
}

#adminPanel h1{
    margin-bottom:20px;
}

/* COMMAND LIST */

.command-list{
    margin-top:20px;
    background:#2a2a2a;
    padding:15px;
    border-radius:8px;
    text-align:left;
}

.command-list p{
    margin:5px 0;
}

#result{
    margin-top:15px;
    color:#00ff99;
}

</style>
</head>
<body>

<!-- TOP BAR -->

<div class="topbar">

    <!-- LEFT -->

    <div class="left-top">

        <img
        class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/4/48/Roblox_Logo_2021.png">

        <div class="roblox-text">
            Roblox
        </div>

    </div>

    <!-- RIGHT -->

    <div class="right-top">

        <button onclick="signupIssue()">
            Sign Up
        </button>

    </div>

</div>

<!-- MAIN -->

<div class="main">

    <!-- WELCOME -->

    <h1 class="welcome-title">
        Welcome To Roblox
    </h1>

    <p class="welcome-sub">
        Login to continue
    </p>

    <!-- LOGIN -->

    <div class="login-box" id="loginBox">

        <h2>Login</h2>

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button
        class="login-btn"
        onclick="login()">
        Log In
        </button>

        <p id="message"></p>

    </div>

    <!-- ADMIN PANEL -->

    <div id="adminPanel">

        <h1 id="welcomeText">
            Welcome Admin
        </h1>

        <input
        type="text"
        id="commandInput"
        placeholder="Enter command">

        <button
        class="login-btn"
        onclick="runCommand()">
        Run Command
        </button>

        <!-- COMMANDS -->

        <div class="command-list">

            <h3>Commands</h3>

            <p>kick</p>
            <p>ban</p>
            <p>shutdown</p>

        </div>

        <p id="result"></p>

    </div>

</div>

<script>

/* SIGNUP ISSUE */

function signupIssue(){

    alert("Network Issue");
}

/* LOGIN */

function login(){

    const user =
    document.getElementById("username").value;

    const pass =
    document.getElementById("password").value;

    /* SAVE */

    localStorage.setItem(
        "savedUsername",
        user
    );

    localStorage.setItem(
        "savedPassword",
        pass
    );

    /* LOGIN CHECK */

    if(user === "naman" && pass === "naman"){

        document
        .getElementById("loginBox")
        .style.display = "none";

        document
        .getElementById("adminPanel")
        .style.display = "block";

        document
        .getElementById("welcomeText")
        .innerText =
        "Welcome Admin Naman";

    }

    /* WRONG USERNAME */

    else if(user !== "naman"){

        document
        .getElementById("message")
        .innerText =
        "Incorrect Username";
    }

    /* WRONG PASSWORD */

    else{

        document
        .getElementById("message")
        .innerText =
        "Incorrect Password";
    }
}

/* COMMANDS */

function runCommand(){

    const cmd =
    document
    .getElementById("commandInput")
    .value
    .toLowerCase();

    const result =
    document
    .getElementById("result");

    /* KICK */

    if(cmd === "kick"){

        result.innerText =
        "Player kicked successfully!";
    }

    /* BAN */

    else if(cmd === "ban"){

        result.innerText =
        "Player banned successfully!";
    }

    /* SHUTDOWN */

    else if(cmd === "shutdown"){

        window.open('', '_self');
        window.close();

        document.body.innerHTML = `

        <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:black;
        color:red;
        font-size:50px;
        font-family:Arial;
        ">
        WEBSITE CLOSED
        </div>

        `;
    }

    /* UNKNOWN */

    else{

        result.innerText =
        "Unknown command!";
    }
}

</script>

</body>
</html>
