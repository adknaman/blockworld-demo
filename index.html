<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

/* NAVBAR */

.navbar{
    width:100%;
    background:#1e1e1e;
    padding:15px 30px;
    display:flex;
    justify-content:flex-end;
    gap:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.navbar button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#0078ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.navbar button:hover{
    background:#005fd1;
}

/* PAGES */

.section{
    display:none;
    text-align:center;
    padding:40px;
}

.active{
    display:block;
}

/* BOX */

.container{
    width:360px;
    margin:auto;
    margin-top:40px;
    background:#1e1e1e;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

/* LOGO */

.logo{
    width:180px;
    margin-bottom:20px;
}

/* INPUTS */

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#2d2d2d;
    color:white;
    font-size:16px;
}

/* BUTTONS */

.main-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0078ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.main-btn:hover{
    background:#005fd1;
}

/* ADMIN PANEL */

#adminPanel{
    display:none;
}

/* COMMANDS */

.command-list{
    margin-top:20px;
    background:#2a2a2a;
    padding:15px;
    border-radius:8px;
    text-align:left;
}

.command-list p{
    margin:5px 0;
}

/* SAVED DATA */

.saved-data{
    margin-top:20px;
    background:#2a2a2a;
    padding:15px;
    border-radius:8px;
    text-align:left;
}

/* TEXT */

#message{
    margin-top:15px;
    color:red;
}

#result{
    margin-top:15px;
    color:#00ff99;
}

.home-text{
    margin-top:20px;
    font-size:20px;
}

</style>
</head>
<body>

<!-- TOP RIGHT NAVBAR -->

<div class="navbar">

    <button onclick="showHome()">
        Home
    </button>

    <button onclick="showLogin()">
        Login
    </button>

</div>

<!-- HOME PAGE -->

<div id="homePage" class="section active">

    <img
    class="logo"
    src="https://upload.wikimedia.org/wikipedia/commons/4/48/Roblox_Logo_2021.png">

    <h1>Roblox</h1>

    <p class="home-text">
        Welcome to Roblox Website
    </p>

</div>

<!-- LOGIN PAGE -->

<div id="loginPage" class="section">

    <!-- LOGIN BOX -->

    <div class="container" id="loginBox">

        <img
        class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/4/48/Roblox_Logo_2021.png">

        <h1>Login</h1>

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="password"
        id="password"
        placeholder="Password">

        <button
        class="main-btn"
        onclick="login()">
        Log In
        </button>

        <p id="message"></p>

    </div>

    <!-- ADMIN PANEL -->

    <div class="container" id="adminPanel">

        <img
        class="logo"
        src="https://upload.wikimedia.org/wikipedia/commons/4/48/Roblox_Logo_2021.png">

        <h1 id="welcomeText">
            Welcome Admin
        </h1>

        <p style="margin-bottom:20px;">
            Roblox Admin System
        </p>

        <input
        type="text"
        id="commandInput"
        placeholder="Enter command">

        <button
        class="main-btn"
        onclick="runCommand()">
        Run Command
        </button>

        <!-- COMMANDS -->

        <div class="command-list">

            <h3>Available Commands</h3>

            <p>kick</p>
            <p>ban</p>
            <p>shutdown</p>

        </div>

        <!-- SAVED LOGIN -->

        <div class="saved-data">

            <h3>Saved Login Data</h3>

            <p id="savedUser"></p>

            <p id="savedPass"></p>

        </div>

        <p id="result"></p>

    </div>

</div>

<script>

/* PAGE SYSTEM */

function showHome(){

    document
    .getElementById("homePage")
    .classList.add("active");

    document
    .getElementById("loginPage")
    .classList.remove("active");
}

function showLogin(){

    document
    .getElementById("loginPage")
    .classList.add("active");

    document
    .getElementById("homePage")
    .classList.remove("active");
}

/* LOAD SAVED DATA */

window.onload = function(){

    const savedUser =
    localStorage.getItem("savedUsername");

    const savedPass =
    localStorage.getItem("savedPassword");

    if(savedUser){

        document
        .getElementById("savedUser")
        .innerText =
        "Username: " + savedUser;
    }

    if(savedPass){

        document
        .getElementById("savedPass")
        .innerText =
        "Password: " + savedPass;
    }
};

/* LOGIN SYSTEM */

function login(){

    const user =
    document.getElementById("username").value;

    const pass =
    document.getElementById("password").value;

    /* SAVE DATA */

    localStorage.setItem(
        "savedUsername",
        user
    );

    localStorage.setItem(
        "savedPassword",
        pass
    );

    /* ADMIN LOGIN */

    if(user === "naman" && pass === "naman"){

        /* HIDE LOGIN */

        document
        .getElementById("loginBox")
        .style.display = "none";

        /* SHOW ADMIN PANEL */

        document
        .getElementById("adminPanel")
        .style.display = "block";

        /* WELCOME MESSAGE */

        document
        .getElementById("welcomeText")
        .innerText =
        "Welcome Admin Naman";

        /* SHOW SAVED DATA */

        document
        .getElementById("savedUser")
        .innerText =
        "Username: " + user;

        document
        .getElementById("savedPass")
        .innerText =
        "Password: " + pass;

    }

    /* WRONG USERNAME */

    else if(user !== "naman"){

        document
        .getElementById("message")
        .innerText =
        "Incorrect Username";
    }

    /* WRONG PASSWORD */

    else{

        document
        .getElementById("message")
        .innerText =
        "Incorrect Password";
    }
}

/* COMMAND SYSTEM */

function runCommand(){

    const cmd =
    document
    .getElementById("commandInput")
    .value
    .toLowerCase();

    const result =
    document
    .getElementById("result");

    /* KICK */

    if(cmd === "kick"){

        result.innerText =
        "Player kicked successfully!";
    }

    /* BAN */

    else if(cmd === "ban"){

        result.innerText =
        "Player banned successfully!";
    }

    /* SHUTDOWN */

    else if(cmd === "shutdown"){

        /* TRY TO CLOSE TAB */

        window.open('', '_self');
        window.close();

        /* FALLBACK SCREEN */

        document.body.innerHTML = `

        <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        background:black;
        color:red;
        font-size:40px;
        ">

        WEBSITE CLOSED

        <p style="
        margin-top:20px;
        font-size:20px;
        color:white;
        ">
        Browser blocked automatic closing.
        You can close this tab manually.
        </p>

        </div>
        `;
    }

    /* UNKNOWN */

    else{

        result.innerText =
        "Unknown command!";
    }
}

</script>

</body>
</html>
