<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}

/* TOP BAR (ROBLOX STYLE) */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  background:#1f1f1f;
  position:sticky;
  top:0;
  border-bottom:1px solid #333;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:bold;
  cursor:pointer;
}

.logo img{
  height:32px;
}

/* NAV BUTTONS */
.nav{
  display:flex;
  gap:10px;
}

.nav button{
  background:#2a2a2a;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

.nav button:hover{
  background:#3a3a3a;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px;
}

.hero h1{
  font-size:40px;
}

/* LOGIN MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#222;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}

/* BUTTON STYLE (ROBLOX LIKE) */
.btn{
  background:#00a2ff;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:6px;
  cursor:pointer;
}

.btn:hover{
  background:#008ad6;
}

/* PROFILE BOX */
.box{
  margin:20px;
  padding:15px;
  background:#1e1e1e;
  border-radius:10px;
}

/* ADMIN */
.admin{
  margin:20px;
  padding:15px;
  background:#111;
  border:1px solid #333;
  border-radius:10px;
}
</style>

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">

  <div class="logo" onclick="home()">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Roblox_%282025%29_%28App_Icon%29.svg/500px-Roblox_%282025%29_%28App_Icon%29.svg.png">
    <span>Roblox</span>
  </div>

  <div class="nav">
    <button onclick="home()">Home</button>
    <button onclick="showProfile()">Profile</button>
    <button id="adminBtn" style="display:none" onclick="showAdmin()">Admin</button>
    <button onclick="openLogin()">Login</button>
  </div>

</div>

<!-- HERO -->
<div class="hero" id="home">
  <h1>Welcome</h1>
</div>

<!-- PROFILE -->
<div class="box" id="profile" style="display:none;">
  <h3>Profile</h3>
  <div id="profileBox">No user logged in</div>
</div>

<!-- ADMIN -->
<div class="admin" id="admin" style="display:none;">
  <h3>Admin Panel</h3>
  <div id="adminBox"></div>
</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
<div class="modal-content">

<h3>Login</h3>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>
<button onclick="closeLogin()">Close</button>

</div>
</div>

<script>

function home(){
  document.getElementById("home").scrollIntoView();
}

function openLogin(){
  document.getElementById("loginModal").style.display="flex";
}

function closeLogin(){
  document.getElementById("loginModal").style.display="none";
}

/* LOGIN */
function login(){

  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;

  if(!u || !p){
    alert("Fill all fields");
    return;
  }

  localStorage.setItem("userData",JSON.stringify({username:u,password:p}));

  closeLogin();
  showProfile();
  checkAdmin(u,p);
}

/* PROFILE */
function showProfile(){

  let data=JSON.parse(localStorage.getItem("userData"));

  if(!data){
    document.getElementById("profile").style.display="block";
    document.getElementById("profileBox").innerHTML="No user logged in";
    return;
  }

  document.getElementById("profile").style.display="block";

  document.getElementById("profileBox").innerHTML=
  "Username: "+data.username;
}

/* ADMIN */
function checkAdmin(u,p){

  if(u==="naman" && p==="naman"){
    document.getElementById("admin").style.display="block";
    document.getElementById("adminBtn").style.display="inline";

    document.getElementById("adminBox").innerHTML=
    "Welcome Admin Naman 👑";
  }
}

function showAdmin(){
  document.getElementById("admin").style.display="block";
}

/* LOAD */
window.onload=function(){
  let data=JSON.parse(localStorage.getItem("userData"));
  if(data){
    showProfile();
    checkAdmin(data.username,data.password);
  }
};

</script>

</body>
</html>
